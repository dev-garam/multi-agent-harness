name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      # 이 프로젝트는 무의존성이고 lockfile도 없으므로 별도 install 단계가 없다.
      - run: npm run check
      - run: npm test
